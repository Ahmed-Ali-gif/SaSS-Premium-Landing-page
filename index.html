<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/CSS/style.css" />
    <link rel="stylesheet" href="/CSS/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="conatiner">
      <header class="main-navbar--container">
        <div class="logo">
          <span>ApexFlow</span>
        </div>
        <nav>
          <ul class="navbar-items">
            <li><a href="#" class="links">Product</a></li>
            <li><a href="#" class="links">features</a></li>
            <li><a href="#" class="links">pricing</a></li>
            <li><a href="#" class="links">resources</a></li>
            <li><a href="#" class="links">company</a></li>
          </ul>
        </nav>
        <div class="authentication-section">
          <div class="login">
            <a href="#" class="links-login" target="_blank">Log in</a>
          </div>
          <div class="btn">
            <button class="get-started--btn">
              Get Started <i class="fa-solid fa-left-right"></i>
            </button>
          </div>
        </div>
      </header>
      <main>
        <section class="hero-section">
          <section class="hero-text--section">
            <h1 class="hero-heading">
              Build, automate & grow your buisness <span>10x</span> faster
            </h1>
            <p class="para-heading">
              Apexflow helps teams streamline workflows, track performance and
              ship amazing products
            </p>
            <div class="main-btn--section">
              <button class="button-one">
                <a href="#">Get satarted</a>
                <i class="fa-solid fa-left-right"></i>
              </button>
              <button class="button-2">
                <a href="#"><i class="fa-solid fa-video"></i> Watch demo</a>
              </button>
            </div>
            <div class="stars">
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
            </div>
            <p class="sub-para">Trusted by 10,000+ teams worldwide</p>
          </section>
          <section class="img-section">
            <img src="/image/buisness.webp" alt="buisness-img" />
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
